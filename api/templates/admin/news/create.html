<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create News or Event - E-Looc Admin</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <style>
    :root {
      --primary-color: #0a2472;
      --secondary-color: #0e6ba8;
      --accent-color: #00b2ca;
      --light-color: #f0f8ff;
      --dark-color: #001845;
    }
    body {
      background-color: var(--light-color);
      font-family: "Poppins", sans-serif;
    }
    .container {
      max-width: 700px;
      margin-top: 40px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: var(--primary-color);
      margin-bottom: 25px;
      font-weight: 700;
    }
    .form-label {
      font-weight: 600;
      color: var(--dark-color);
    }
    .btn-primary {
      background-color: var(--secondary-color);
      border-color: var(--secondary-color);
    }
    .btn-primary:hover {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }
    .form-check-label {
      font-weight: 500;
    }
    .back-link {
      margin-top: 15px;
      display: inline-block;
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .back-link:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-plus-circle me-2"></i> Create News or Event</h1>
    <form action="{{ url_for('admin_create_news') }}" method="POST">
      <div class="mb-3">
        <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-control"
          placeholder="Enter title"
          required
        />
      </div>
      <div class="mb-3">
        <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
        <textarea
          id="content"
          name="content"
          class="form-control"
          rows="6"
          placeholder="Enter content"
          required
        ></textarea>
      </div>
      <div class="form-check mb-3">
        <input
          type="checkbox"
          id="is_active"
          name="is_active"
          class="form-check-input"
          checked
        />
        <label for="is_active" class="form-check-label">Active</label>
      </div>
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="{{ url_for('admin_news') }}" class="back-link">← Back to News & Events</a>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
