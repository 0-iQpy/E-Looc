{% extends "admin/layout.html" %}

{% block title %}Edit News Item - E-Looc Admin{% endblock %}

{% block content %}
<div class="container-fluid">
  <h1 class="h3 mb-4 text-gray-800">Edit News or Events</h1>
  <div class="card shadow mb-4">
    <div class="card-body">
      <form method="POST" action="{{ url_for('admin_edit_news', id=news.id) }}">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" class="form-control" id="title" name="title" value="{{ news.title }}" required>
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea class="form-control" id="content" name="content" rows="6" required>{{ news.content }}</textarea>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if news.is_active %}checked{% endif %}>
          <label class="form-check-label" for="is_active">
            Active
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Update News or Events</button>
        <a href="{{ url_for('admin_news') }}" class="btn btn-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
